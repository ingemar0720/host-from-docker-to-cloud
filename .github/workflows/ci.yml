name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "examples/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "examples/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25.x", "stable"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify
        run: |
          go mod tidy
          git diff --exit-code
          go vet ./...
          go test -race -shuffle=on -count=1 ./...
          go build -o /tmp/d2z ./cmd/d2z
          /tmp/d2z check -workdir examples -f examples/docker-compose.yml
