name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Verify
        run: |
          go vet ./...
          go test -race -count=1 ./...
          go build -o /tmp/d2z ./cmd/d2z
          /tmp/d2z check -workdir examples -f examples/docker-compose.yml
